services:
  web:
    build: ./docker/web
    ports:
      - "8080:80"
    volumes:
      - ./demos:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seclab
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  chatbot:
    build: ./demos/04-prompt-injection
    ports:
      - "8000:8000"
      - "8001:8001"
    env_file:
      - .env
